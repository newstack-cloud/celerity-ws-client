version: 2
updates:
  # GitHub Actions — weekly updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # npm — all dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "deps(ws-client)"
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
