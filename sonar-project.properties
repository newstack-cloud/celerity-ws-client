sonar.projectKey=newstack-cloud_celerity-ws-client
sonar.organization=newstack-cloud
sonar.projectName=Celerity WS Client

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/unit/**/*.test.ts,tests/integration/**/*.test.ts

# Exclusions from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.js,\
  **/*.mjs,\
  **/*.cjs,\
  **/*.d.ts,\
  **/coverage/**,\
  examples/**,\
  tests/server/**

# Coverage (LCOV from vitest + @vitest/coverage-v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ESLint report (JSON from eslint -f json)
sonar.eslint.reportPaths=eslint-report.json

sonar.sourceEncoding=UTF-8
